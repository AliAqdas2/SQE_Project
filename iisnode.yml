# ===========================================
# Plegit 2.0 - iisnode Configuration
# ===========================================
# This file provides additional iisnode settings
# Place in the same directory as web.config
# ===========================================

# Node.js environment
node_env: production

# Number of Node.js processes to spawn
# 0 = one process per CPU core (recommended for production)
# 1 = single process (recommended for debugging)
nodeProcessCountPerApplication: 0

# Maximum concurrent requests per Node.js process
maxConcurrentRequestsPerProcess: 1024

# Named pipe connection settings
maxNamedPipeConnectionRetry: 100
namedPipeConnectionRetryDelay: 250
maxNamedPipeConnectionPoolSize: 512
maxNamedPipePooledConnectionAge: 30000

# Buffer settings
initialRequestBufferSize: 4096
maxRequestBufferSize: 65536

# Logging settings
loggingEnabled: true
logDirectory: iisnode
maxLogFileSizeInKB: 1024
maxTotalLogFileSizeInKB: 10240
maxLogFiles: 20

# Debugging (disable in production)
debuggingEnabled: false
debugHeaderEnabled: false
debuggerPortRange: 5058-6058
debuggerPathSegment: debug

# Error handling
devErrorsEnabled: false

# File watching for auto-restart
watchedFiles: web.config;iisnode.yml;dist/*.js

# Graceful shutdown timeout (ms)
gracefulShutdownTimeout: 60000

# Enable X-Forwarded-For header
enableXFF: true

# Response flushing
flushResponse: false

# Promote server variables to process.env
promoteServerVars: AUTH_USER,AUTH_TYPE,LOGON_USER,SERVER_NAME,SERVER_PORT,HTTPS,REMOTE_ADDR
